<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Ponte Tu Casco Zanka - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- ✅ MARQUESINA — intacta -->
    <header class="marquee-container">
        <div class="marquee-text">
            <span>Zankas que se registraron: 1,240</span>
            <span>Zankas que canjearon voucher: 850</span>
            <span>% TOTAL DE REGISTROS: 85%</span>
            <span>% LLENARON FORMULARIO: 72%</span>
        </div>
    </header>

    <!-- ✅ NAV — intacto -->
    <nav class="info-buttons">
        <button>INICIO</button>
        <button>REGISTRARSE</button>
        <button>PUNTOS</button>
        <button>CONTACTO</button>
    </nav>

    <!-- ✅ VIDEO FIJO — intacto -->
    <div id="video-container">
        <video id="v-casco" preload="auto" muted playsinline disablePictureInPicture>
            <source src="Casco.mp4" type="video/mp4">
            Tu navegador no soporta video HTML5.
        </video>
    </div>

    <main class="scroll-container">

        <!-- ✅ SPACERS — intactos (mueven el video de casco) -->
        <section class="spacer"></section>
        <section class="spacer"></section>

        <!--
      🌊 WAVE TRANSITION
      Esta sección nueva aparece justo ANTES de la action-section.
      Contiene el canvas que dibuja la ola "invadiendo" la pantalla
      mientras el usuario hace scroll hacia abajo.
      El JS detecta qué tan visible está esta sección y anima la ola.
    -->
        <section id="wave-transition">
            <canvas id="wave-canvas"></canvas>
        </section>

        <!-- ✅ ACTION SECTION — estructura intacta, se agrega canvas de olas interno -->
        <section class="action-section">

            <!--
        🌊 CANVAS DE OLAS DENTRO DE LA ACTION-SECTION
        Este canvas dibuja olas animadas en loop sobre
        el fondo de arena. El contenido (videos, botón)
        flota encima gracias a z-index.
      -->
            <canvas id="action-wave-canvas"></canvas>

            <!-- ✅ Contenido original intacto -->
            <div class="video-card">
                <video src="puntos_registro.mp4" muted loop playsinline autoplay></video>
                <div class="label">Puntos de Registro</div>
            </div>

            <button class="btn-main-register">REGISTRARSE</button>

            <div class="video-card large">
                <video src="infracciones.mp4" muted loop playsinline autoplay></video>
                <div class="label">Módulo de Infracciones</div>
            </div>

        </section>

    </main>

    <script src="script.js"></script>
</body>

</html>
